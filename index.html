<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Central Comercial · MasterInfo</title>
<style>
  :root{
    --ink:#141414;--paper:#faf9f8;--card:#fff;--muted:#6b7280;--line:#ededed;
    --orange:#ff7a1a;--orange-soft:#ffb37a;--orange-deep:#e85d00;
    --gray:#9aa0a6;--green:#16a34a;--red:#c0392b;--blue:#2563eb;
    --shadow:0 10px 30px rgba(0,0,0,.07);--shadow-lg:0 24px 60px rgba(20,20,20,.14);
    --radius:16px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  .hide{display:none!important}
  #login{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(120% 120% at 100% 0,#fff6ef,#faf9f8)}
  .loginbox{width:100%;max-width:390px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);padding:32px 28px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .brand .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--orange),var(--orange-deep));display:grid;place-items:center;font-weight:800;color:#fff;font-size:20px;box-shadow:0 6px 16px rgba(255,122,26,.45)}
  .brand b{font-size:16px;line-height:1.1}.brand small{display:block;color:var(--gray);font-size:12px;margin-top:2px}
  .loginbox h1{font-size:20px;margin:6px 0 4px}
  .loginbox .lsub{color:var(--muted);font-size:13.5px;margin:0 0 18px}
  label{display:block;font-size:12px;font-weight:700;color:#555;margin:12px 0 5px}
  input,select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14.5px;background:#fff;outline:none;transition:.15s}
  input:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,122,26,.15)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--orange),var(--orange-deep));color:#fff;font-weight:800;font-size:15px;margin-top:18px;box-shadow:0 8px 20px rgba(255,122,26,.35)}
  .btn:hover{filter:brightness(1.05)}.btn:disabled{opacity:.6;cursor:default}
  .btn.sec{background:#fff;color:#333;border:1px solid var(--line);box-shadow:none;font-weight:700}
  .btn.sm{width:auto;padding:8px 14px;font-size:13px;margin:0}
  .btn.danger{background:#fff;color:var(--red);border:1px solid #f3c2bd;box-shadow:none}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:10px;padding:9px 12px;font-size:13px;margin-top:14px}
  .hint{margin-top:16px;font-size:12px;color:var(--gray);background:#f7f7f8;border:1px dashed #e2e2e2;border-radius:10px;padding:10px 12px;line-height:1.6}
  .topbar{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:12px 20px}
  .topbar .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--orange),var(--orange-deep));display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px;flex:none}
  .topbar b{font-size:15px}
  .nav{display:flex;gap:6px;margin-left:12px}
  .nav button{border:none;background:transparent;color:#555;font-weight:700;font-size:13.5px;padding:8px 13px;border-radius:9px}
  .nav button:hover{background:#fff6ef;color:#111}
  .nav button.active{background:linear-gradient(90deg,rgba(255,122,26,.16),rgba(255,122,26,.02));color:#111;box-shadow:inset 0 0 0 1px rgba(255,122,26,.4)}
  .me{margin-left:auto;display:flex;align-items:center;gap:12px}
  .me .who{text-align:right;line-height:1.15}.me .who b{font-size:13.5px}.me .who small{color:var(--gray);font-size:11px}
  .rb{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:3px 9px;border-radius:999px;color:#fff}
  .rb.gestor{background:#141414}.rb.lider{background:linear-gradient(135deg,var(--orange),var(--orange-deep))}.rb.colaborador{background:#2563eb}
  main{max-width:1040px;margin:0 auto;padding:26px 22px 90px}
  h2.page{font-size:24px;letter-spacing:-.5px;margin:6px 0 4px}
  .psub{color:var(--muted);font-size:14.5px;margin:0 0 22px}
  .cat{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--orange);margin:24px 0 10px}
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .tile{display:block;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 17px;box-shadow:var(--shadow);text-decoration:none;color:inherit;transition:.15s}
  .tile:hover{transform:translateY(-2px);border-color:var(--orange-soft);box-shadow:var(--shadow-lg)}
  .tile.soon{opacity:.72;cursor:default}
  .tile.soon:hover{transform:none;border-color:var(--line);box-shadow:var(--shadow)}
  .tile .em{font-size:24px}
  .tile h4{margin:9px 0 4px;font-size:15px}
  .tile p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
  .tile .soonlb{display:inline-block;margin-top:8px;font-size:10.5px;font-weight:800;color:#9a7b00;background:#fff8e1;border:1px solid #f0e0a0;border-radius:999px;padding:2px 8px}
  .empty{background:#fff;border:1px dashed #e2e2e2;border-radius:14px;padding:26px;text-align:center;color:var(--gray);font-size:14px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
  .panel .ph{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
  .panel .ph b{font-size:15.5px}.panel .ph .btn{margin-left:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#8a8a8a;border-bottom:1px solid var(--line)}
  td{padding:11px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .acts{display:flex;gap:6px;justify-content:flex-end}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:#555}
  .iconbtn:hover{background:#fff6ef;border-color:var(--orange-soft);color:var(--orange-deep)}
  .iconbtn.del:hover{background:#fef2f2;border-color:#f3c2bd;color:var(--red)}
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tabs button{border:1px solid var(--line);background:#fff;font-weight:700;font-size:13.5px;padding:9px 15px;border-radius:10px;color:#555}
  .tabs button.active{background:#141414;color:#fff;border-color:#141414}
  .note{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:12px;padding:11px 15px;font-size:13px;line-height:1.55;margin:0 0 16px}
  .note a{color:#1d4ed8;font-weight:700}
  .ov{position:fixed;inset:0;background:rgba(20,20,20,.5);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:60;padding:20px}
  .modal{width:100%;max-width:460px;background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);padding:24px;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 4px;font-size:18px}.modal .msub{color:var(--muted);font-size:13px;margin:0 0 12px}
  .roles{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .roles label{display:flex;align-items:center;gap:7px;background:#fafafa;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;color:#333;margin:0;cursor:pointer}
  .roles input{width:auto;margin:0}
  .mfoot{display:flex;gap:10px;margin-top:20px}.mfoot .btn{margin:0}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#141414;color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);z-index:80;opacity:0;transition:.25s}
  .toast.on{opacity:1}
  .toast.bad{background:#b91c1c}
  .loading{color:var(--gray);font-size:14px;padding:20px 2px}
  @media(max-width:640px){.nav button span{display:none}.me .who{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <form class="loginbox" id="loginForm" autocomplete="on">
    <div class="brand"><div class="logo">M</div><div><b>Central Comercial</b><small>MasterInfo Internet</small></div></div>
    <h1>Entrar</h1>
    <p class="lsub">Acesse com seu e-mail e senha.</p>
    <label>E-mail</label>
    <input id="u" type="email" placeholder="voce@masterinfo.com" autocomplete="username">
    <label>Senha</label>
    <input id="p" type="password" placeholder="sua senha" autocomplete="current-password">
    <div id="loginErr" class="err hide"></div>
    <button class="btn" type="submit" id="loginBtn">Entrar</button>
    <div class="hint">Use o e-mail e a senha que foram cadastrados pra você. Não tem acesso? Fale com o Gestor.</div>
  </form>
</div>

<!-- APP -->
<div id="app" class="hide">
  <div class="topbar">
    <div class="logo">M</div><b>Central Comercial</b>
    <div class="nav" id="nav"></div>
    <div class="me">
      <div class="who"><b id="meName"></b><br><small id="meRoleTxt"></small></div>
      <span class="rb" id="meBadge"></span>
      <button class="btn sec sm" id="logout">Sair</button>
    </div>
  </div>
  <main id="view"></main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  var SUPABASE_URL = "https://rpqxcskakuphpyglnrib.supabase.co";
  var SUPABASE_KEY = "sb_publishable_xhh-g0rT6DsvBphFiv7fnQ_i9PICYpC";
  var DASH_USERS = "https://supabase.com/dashboard/project/rpqxcskakuphpyglnrib/auth/users";
  var ROLES = { colaborador:"Colaborador", lider:"Líder", gestor:"Gestor" };
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var $ = function(s,el){ return (el||document).querySelector(s); };
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m];}); }
  function toast(m,bad){ var t=$("#toast"); t.textContent=m; t.className="toast on"+(bad?" bad":""); clearTimeout(t._t); t._t=setTimeout(function(){t.className="toast";},2200); }

  var me = null;
  var state = { tab:"inicio" };

  /* ---------- LOGIN ---------- */
  $("#loginForm").addEventListener("submit", async function(e){
    e.preventDefault();
    var email=$("#u").value.trim(), senha=$("#p").value;
    var err=$("#loginErr"), btn=$("#loginBtn");
    err.classList.add("hide"); btn.disabled=true; btn.textContent="Entrando...";
    var res = await sb.auth.signInWithPassword({ email:email, password:senha });
    btn.disabled=false; btn.textContent="Entrar";
    if(res.error){
      var msg = res.error.message||"";
      if(/invalid login/i.test(msg)) msg="E-mail ou senha incorretos.";
      else if(/confirm/i.test(msg)) msg="E-mail ainda não confirmado. Peça ao Gestor pra confirmar seu usuário.";
      err.textContent=msg; err.classList.remove("hide"); return;
    }
    boot();
  });

  $("#logout").addEventListener("click", async function(){
    await sb.auth.signOut(); me=null; state.tab="inicio";
    $("#app").classList.add("hide"); $("#login").classList.remove("hide");
    $("#u").value=""; $("#p").value="";
  });

  /* ---------- BOOT ---------- */
  async function boot(){
    var sess = (await sb.auth.getSession()).data.session;
    if(!sess){ $("#app").classList.add("hide"); $("#login").classList.remove("hide"); return; }
    var uid = sess.user.id;
    var prof = await sb.from("profiles").select("*").eq("id",uid).single();
    me = prof.data || { id:uid, nome:(sess.user.email||"Usuário"), email:sess.user.email, tipo:"colaborador" };
    $("#login").classList.add("hide"); $("#app").classList.remove("hide");
    $("#meName").textContent = me.nome || me.email;
    $("#meRoleTxt").textContent = me.email;
    var b=$("#meBadge"); b.textContent=ROLES[me.tipo]||me.tipo; b.className="rb "+me.tipo;
    renderNav(); render();
  }

  function renderNav(){
    var nav=$("#nav"); nav.innerHTML="";
    var tabs=[{k:"inicio",t:"🏠 <span>Início</span>"}];
    if(me.tipo==="gestor") tabs.push({k:"admin",t:"⚙️ <span>Admin</span>"});
    tabs.forEach(function(t){
      var btn=document.createElement("button");
      btn.innerHTML=t.t; if(state.tab===t.k) btn.className="active";
      btn.onclick=function(){ state.tab=t.k; renderNav(); render(); };
      nav.appendChild(btn);
    });
  }

  function render(){
    if(state.tab==="admin" && me.tipo==="gestor"){ renderAdmin(); return; }
    renderDash();
  }

  /* ---------- DASHBOARD ---------- */
  async function renderDash(){
    var v=$("#view");
    var msg = { colaborador:"Seu material de estudo e do dia a dia.", lider:"O que você acompanha e conduz.", gestor:"Tudo, mais a administração do sistema." }[me.tipo]||"";
    v.innerHTML='<h2 class="page">Olá, '+esc((me.nome||me.email).split(" ")[0])+' 👋</h2><p class="psub">'+esc(msg)+'</p><div class="loading">Carregando…</div>';
    var q = await sb.from("content").select("*").order("ordem");
    if(q.error){ v.innerHTML+='<div class="empty">Erro ao carregar o conteúdo.</div>'; return; }
    var visible=(q.data||[]).filter(function(it){ return (it.roles||[]).indexOf(me.tipo)>=0; });
    var cats=[]; visible.forEach(function(it){ if(cats.indexOf(it.categoria)<0) cats.push(it.categoria); });
    var html='<h2 class="page">Olá, '+esc((me.nome||me.email).split(" ")[0])+' 👋</h2><p class="psub">'+esc(msg)+'</p>';
    if(!visible.length){ html+='<div class="empty">Nenhum conteúdo liberado para o seu perfil ainda.</div>'; }
    cats.forEach(function(c){
      html+='<div class="cat">'+esc(c)+'</div><div class="grid">';
      visible.filter(function(it){return it.categoria===c;}).forEach(function(it){
        var real = it.url && it.url!=="#";
        if(real) html+='<a class="tile" href="'+esc(it.url)+'" target="_blank" rel="noopener"><div class="em">'+esc(it.emoji||"📄")+'</div><h4>'+esc(it.titulo)+'</h4><p>'+esc(it.descricao||"")+'</p></a>';
        else html+='<div class="tile soon"><div class="em">'+esc(it.emoji||"📄")+'</div><h4>'+esc(it.titulo)+'</h4><p>'+esc(it.descricao||"")+'</p><span class="soonlb">link a definir</span></div>';
      });
      html+='</div>';
    });
    v.innerHTML=html;
  }

  /* ---------- ADMIN ---------- */
  async function renderAdmin(){
    var v=$("#view");
    v.innerHTML='<h2 class="page">Administração</h2><p class="psub">Gerencie usuários e o conteúdo que cada perfil vê.</p>'+
      '<div class="tabs"><button data-at="users" class="active">👥 Usuários</button><button data-at="content">🗂️ Conteúdo</button></div><div id="ab"><div class="loading">Carregando…</div></div>';
    var at="users";
    function tabsWire(){ Array.prototype.forEach.call(v.querySelectorAll(".tabs button"),function(b){ b.classList.toggle("active",b.getAttribute("data-at")===at); b.onclick=function(){ at=b.getAttribute("data-at"); paint(); }; }); }
    async function paint(){ tabsWire(); if(at==="users") await usersPanel(); else await contentPanel(); }
    tabsWire(); paint();

    async function usersPanel(){
      var q=await sb.from("profiles").select("*").order("created_at");
      var rows=(q.data||[]).map(function(u){
        return '<tr><td><b>'+esc(u.nome||"-")+'</b></td><td>'+esc(u.email||"")+'</td><td><span class="rb '+u.tipo+'">'+(ROLES[u.tipo]||u.tipo)+'</span></td>'+
          '<td class="acts"><button class="iconbtn" data-eu="'+u.id+'">Editar</button></td></tr>';
      }).join("");
      $("#ab",v).innerHTML=
        '<div class="panel"><div class="ph"><b>Usuários</b><button class="btn sm" id="newUser">+ Novo usuário</button></div>'+
        '<table><thead><tr><th>Nome</th><th>E-mail</th><th>Tipo</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
        '<div class="note">Prefere criar/remover pelo Supabase? <a href="'+DASH_USERS+'" target="_blank" rel="noopener">abrir Usuários no painel</a>.</div>';
      $("#newUser",v).onclick=function(){ createUserModal(); };
      Array.prototype.forEach.call(v.querySelectorAll("[data-eu]"),function(b){ b.onclick=function(){ userModal((q.data||[]).filter(function(x){return x.id===b.getAttribute("data-eu");})[0]); }; });
    }
    function createUserModal(){
      openModal("Novo usuário","Cria o login (e-mail e senha) e já define o perfil.",
        '<label>Nome</label><input id="mNome" placeholder="Nome da pessoa">'+
        '<label>E-mail (login)</label><input id="mEmail" type="email" placeholder="pessoa@masterinfo.com">'+
        '<label>Senha inicial (mín. 6)</label><input id="mSenha" placeholder="a pessoa troca depois">'+
        '<label>Tipo de perfil</label><select id="mTipo">'+Object.keys(ROLES).map(function(k){return '<option value="'+k+'">'+ROLES[k]+'</option>';}).join("")+'</select>',
        async function(){
          var nome=$("#mNome").value.trim(), email=$("#mEmail").value.trim(), senha=$("#mSenha").value, tipo=$("#mTipo").value;
          if(!email||!senha){ toast("Informe e-mail e senha.",true); return false; }
          var r=await sb.functions.invoke("create-user",{body:{nome:nome,email:email,password:senha,tipo:tipo}});
          if(r.error){
            var msg="Erro ao criar usuário.";
            try{ var bd=await r.error.context.json(); if(bd&&bd.error) msg=bd.error; }catch(_){}
            if(/Failed to (fetch|send)|NetworkError|not found|404/i.test((r.error.message||"")+" "+msg)) msg="A função 'create-user' ainda não foi publicada no Supabase. Publique e tente de novo.";
            toast(msg,true); return false;
          }
          if(r.data && r.data.error){ toast(r.data.error,true); return false; }
          toast("Usuário criado."); paint(); return true;
        });
    }
    function userModal(u){
      openModal("Editar usuário","Defina o nome e o tipo de perfil (o login e a senha ficam no Supabase).",
        '<label>Nome</label><input id="mNome" value="'+esc(u.nome||"")+'">'+
        '<label>E-mail</label><input value="'+esc(u.email||"")+'" disabled style="opacity:.6">'+
        '<label>Tipo de perfil</label><select id="mTipo">'+Object.keys(ROLES).map(function(k){return '<option value="'+k+'"'+(u.tipo===k?" selected":"")+'>'+ROLES[k]+'</option>';}).join("")+'</select>',
        async function(){
          if(u.id===me.id && $("#mTipo").value!=="gestor"){ toast("Você não pode tirar seu próprio acesso de Gestor.",true); return false; }
          var r=await sb.from("profiles").update({nome:$("#mNome").value.trim(), tipo:$("#mTipo").value}).eq("id",u.id);
          if(r.error){ toast(r.error.message,true); return false; }
          toast("Usuário salvo."); paint(); return true;
        });
    }

    async function contentPanel(){
      var q=await sb.from("content").select("*").order("ordem");
      var rows=(q.data||[]).map(function(it){
        var badges=(it.roles||[]).map(function(r){return '<span class="rb '+r+'" style="margin-right:4px">'+(ROLES[r]||r)+'</span>';}).join("");
        return '<tr><td>'+esc(it.emoji||"📄")+' <b>'+esc(it.titulo)+'</b><br><small style="color:#9aa0a6">'+esc(it.categoria)+'</small></td><td>'+badges+'</td>'+
          '<td class="acts"><button class="iconbtn" data-ei="'+it.id+'">Editar</button><button class="iconbtn del" data-di="'+it.id+'">Excluir</button></td></tr>';
      }).join("");
      $("#ab",v).innerHTML='<div class="panel"><div class="ph"><b>Conteúdo</b><button class="btn sm" id="newItem">+ Novo conteúdo</button></div>'+
        '<table><thead><tr><th>Título</th><th>Quem vê</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
      $("#newItem",v).onclick=function(){ itemModal(null); };
      Array.prototype.forEach.call(v.querySelectorAll("[data-ei]"),function(b){ b.onclick=function(){ itemModal((q.data||[]).filter(function(x){return x.id===b.getAttribute("data-ei");})[0]); }; });
      Array.prototype.forEach.call(v.querySelectorAll("[data-di]"),function(b){ b.onclick=async function(){ if(!confirm("Excluir este conteúdo?"))return; var r=await sb.from("content").delete().eq("id",b.getAttribute("data-di")); if(r.error){toast(r.error.message,true);return;} toast("Excluído."); paint(); }; });
    }
    function itemModal(it){
      var isNew=!it; it=it||{emoji:"📄",titulo:"",descricao:"",url:"",categoria:"Geral",roles:["colaborador","lider","gestor"],ordem:99};
      openModal((isNew?"Novo":"Editar")+" conteúdo","Um card que aparece no Início de quem tiver o perfil marcado.",
        '<label>Emoji</label><input id="mEmoji" value="'+esc(it.emoji)+'" maxlength="4">'+
        '<label>Título</label><input id="mTit" value="'+esc(it.titulo)+'">'+
        '<label>Descrição</label><input id="mDesc" value="'+esc(it.descricao)+'">'+
        '<label>Link (URL) — deixe # se ainda não tiver</label><input id="mUrl" value="'+esc(it.url)+'">'+
        '<label>Categoria</label><input id="mCat" value="'+esc(it.categoria)+'">'+
        '<label>Quem vê</label><div class="roles">'+Object.keys(ROLES).map(function(k){return '<label><input type="checkbox" value="'+k+'"'+((it.roles||[]).indexOf(k)>=0?" checked":"")+'> '+ROLES[k]+'</label>';}).join("")+'</div>',
        async function(){
          var titulo=$("#mTit").value.trim(); if(!titulo){ toast("Dê um título.",true); return false; }
          var roles=Array.prototype.map.call(document.querySelectorAll(".roles input:checked"),function(c){return c.value;});
          if(!roles.length){ toast("Marque ao menos um perfil.",true); return false; }
          var data={emoji:$("#mEmoji").value||"📄",titulo:titulo,descricao:$("#mDesc").value.trim(),url:$("#mUrl").value.trim()||"#",categoria:$("#mCat").value.trim()||"Geral",roles:roles};
          var r = isNew ? await sb.from("content").insert(data) : await sb.from("content").update(data).eq("id",it.id);
          if(r.error){ toast(r.error.message,true); return false; }
          toast("Conteúdo salvo."); paint(); return true;
        });
    }
  }

  /* ---------- MODAL ---------- */
  function openModal(title,sub,bodyHtml,onSave){
    var ov=document.createElement("div"); ov.className="ov";
    ov.innerHTML='<div class="modal"><h3>'+esc(title)+'</h3><p class="msub">'+esc(sub)+'</p><div>'+bodyHtml+'</div>'+
      '<div class="mfoot"><button class="btn sec" id="mCancel">Cancelar</button><button class="btn" id="mSave">Salvar</button></div></div>';
    document.body.appendChild(ov);
    function close(){ if(ov.parentNode) document.body.removeChild(ov); }
    ov.addEventListener("click",function(e){ if(e.target===ov) close(); });
    $("#mCancel",ov).onclick=close;
    $("#mSave",ov).onclick=async function(){ var b=$("#mSave",ov); b.disabled=true; var ok=await onSave(); b.disabled=false; if(ok!==false) close(); };
  }

  /* ---------- START ---------- */
  boot();
})();
</script>
</body>
</html>
