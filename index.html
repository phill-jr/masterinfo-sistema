<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Central Comercial · MasterInfo</title>
<style>
  :root{
    --ink:#141414;--paper:#f6f6f7;--card:#fff;--muted:#6b7280;--line:#ededed;
    --orange:#ff7a1a;--orange-soft:#ffb37a;--orange-deep:#e85d00;
    --gray:#9aa0a6;--green:#16a34a;--red:#c0392b;--blue:#2563eb;
    --sb:264px;
    --shadow:0 10px 30px rgba(0,0,0,.07);--shadow-lg:0 24px 60px rgba(20,20,20,.14);
    --radius:16px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  .hide{display:none!important}
  a{color:inherit}
  /* ===== LOGIN ===== */
  #login{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(120% 120% at 100% 0,#fff2e6,#f6f6f7)}
  .loginbox{width:100%;max-width:390px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);padding:32px 28px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .brand .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--orange),var(--orange-deep));display:grid;place-items:center;font-weight:800;color:#fff;font-size:20px;box-shadow:0 6px 16px rgba(255,122,26,.45)}
  .brand b{font-size:16px;line-height:1.1}.brand small{display:block;color:var(--gray);font-size:12px;margin-top:2px}
  .loginbox h1{font-size:20px;margin:6px 0 4px}
  .loginbox .lsub{color:var(--muted);font-size:13.5px;margin:0 0 18px}
  label{display:block;font-size:12px;font-weight:700;color:#555;margin:12px 0 5px}
  input,select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14.5px;background:#fff;outline:none;transition:.15s}
  input:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,122,26,.15)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--orange),var(--orange-deep));color:#fff;font-weight:800;font-size:15px;margin-top:18px;box-shadow:0 8px 20px rgba(255,122,26,.35)}
  .btn:hover{filter:brightness(1.05)}.btn:disabled{opacity:.6;cursor:default}
  .btn.sec{background:#fff;color:#333;border:1px solid var(--line);box-shadow:none;font-weight:700}
  .btn.sm{width:auto;padding:8px 14px;font-size:13px;margin:0}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:10px;padding:9px 12px;font-size:13px;margin-top:14px}
  .hint{margin-top:16px;font-size:12px;color:var(--gray);background:#f7f7f8;border:1px dashed #e2e2e2;border-radius:10px;padding:10px 12px;line-height:1.6}
  /* ===== SHELL ===== */
  #app{min-height:100vh}
  .menuBtn{position:fixed;top:14px;left:14px;z-index:45;width:42px;height:42px;border:none;border-radius:12px;background:#fff;color:#141414;font-size:19px;box-shadow:var(--shadow);display:none}
  .scrim{position:fixed;inset:0;background:rgba(20,20,20,.45);z-index:40;opacity:0;pointer-events:none;transition:.25s}
  .scrim.on{opacity:1;pointer-events:auto}
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:var(--sb);background:#fff;border-right:1px solid var(--line);z-index:44;display:flex;flex-direction:column;padding:18px 14px;transition:transform .28s cubic-bezier(.4,0,.2,1)}
  .sbrand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
  .sbrand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--orange),var(--orange-deep));display:grid;place-items:center;font-weight:800;color:#fff;font-size:18px;box-shadow:0 6px 16px rgba(255,122,26,.45);flex:none}
  .sbrand b{font-size:14.5px;line-height:1.1}.sbrand small{display:block;color:var(--gray);font-size:11px;margin-top:2px}
  .snav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1;margin-top:4px}
  .snav .sec{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--gray);padding:14px 12px 6px}
  .snav button{display:flex;align-items:center;gap:11px;width:100%;border:none;background:transparent;color:#4b5563;font-weight:600;font-size:14px;padding:10px 12px;border-radius:11px;text-align:left;transition:.15s}
  .snav button .ic{font-size:17px;width:22px;text-align:center;flex:none}
  .snav button:hover{background:#f6f6f7;color:#111}
  .snav button.active{background:linear-gradient(90deg,rgba(255,122,26,.16),rgba(255,122,26,.03));color:#111;box-shadow:inset 0 0 0 1px rgba(255,122,26,.35);font-weight:700}
  .sme{border-top:1px solid var(--line);padding-top:12px;margin-top:8px}
  .sme .card{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:12px;background:#faf9f8;border:1px solid var(--line)}
  .avatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#2b2b2b,#141414);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;flex:none}
  .sme .info{min-width:0;flex:1}.sme .info b{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sme .info .role{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#fff;padding:2px 7px;border-radius:999px;display:inline-block;margin-top:3px}
  .role.gestor{background:#141414}.role.lider{background:linear-gradient(135deg,var(--orange),var(--orange-deep))}.role.colaborador{background:#2563eb}
  .sme .logout{width:100%;margin-top:8px;border:1px solid var(--line);background:#fff;color:#555;font-weight:700;font-size:13px;padding:9px;border-radius:11px}
  .sme .logout:hover{background:#fef2f2;border-color:#f3c2bd;color:var(--red)}
  .main{margin-left:var(--sb);min-height:100vh;padding:34px 34px 90px}
  /* ===== CONTENT ===== */
  .hero{margin-bottom:6px}
  .hero h1{font-size:30px;letter-spacing:-.8px;margin:0 0 6px;font-weight:800}
  .hero h1 .wave{background:linear-gradient(120deg,#141414 40%,var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);font-size:15.5px;margin:0}
  .cat{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--orange);margin:30px 0 12px}
  .grid{display:grid;gap:15px;grid-template-columns:repeat(auto-fill,minmax(255px,1fr))}
  .tile{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:15px;padding:18px;box-shadow:var(--shadow);text-decoration:none;color:inherit;transition:.16s}
  .tile:hover{transform:translateY(-3px);border-color:var(--orange-soft);box-shadow:var(--shadow-lg)}
  .tile.soon{opacity:.7}.tile.soon:hover{transform:none;border-color:var(--line);box-shadow:var(--shadow)}
  .tile .em{font-size:26px}
  .tile h4{margin:11px 0 5px;font-size:15.5px}
  .tile p{margin:0;color:var(--muted);font-size:13px;line-height:1.5;flex:1}
  .tile .soonlb{align-self:flex-start;margin-top:11px;font-size:10.5px;font-weight:800;color:#9a7b00;background:#fff8e1;border:1px solid #f0e0a0;border-radius:999px;padding:3px 9px}
  .empty{background:#fff;border:1px dashed #e2e2e2;border-radius:15px;padding:30px;text-align:center;color:var(--gray);font-size:14px}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px;margin:22px 0 6px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 17px;box-shadow:var(--shadow)}
  .stat .n{font-size:26px;font-weight:800;color:var(--orange-deep);line-height:1}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:5px}
  h2.page{font-size:24px;letter-spacing:-.5px;margin:0 0 4px}
  .psub{color:var(--muted);font-size:14.5px;margin:0 0 22px}
  /* admin */
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tabs button{border:1px solid var(--line);background:#fff;font-weight:700;font-size:13.5px;padding:9px 15px;border-radius:10px;color:#555}
  .tabs button.active{background:#141414;color:#fff;border-color:#141414}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .panel .ph{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
  .panel .ph b{font-size:15.5px}.panel .ph .btn{margin-left:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#8a8a8a;border-bottom:1px solid var(--line)}
  td{padding:11px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .rb{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:3px 9px;border-radius:999px;color:#fff}
  .rb.gestor{background:#141414}.rb.lider{background:linear-gradient(135deg,var(--orange),var(--orange-deep))}.rb.colaborador{background:#2563eb}
  .acts{display:flex;gap:6px;justify-content:flex-end}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:#555}
  .iconbtn:hover{background:#fff6ef;border-color:var(--orange-soft);color:var(--orange-deep)}
  .iconbtn.del:hover{background:#fef2f2;border-color:#f3c2bd;color:var(--red)}
  .note{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:12px;padding:11px 15px;font-size:13px;line-height:1.55;margin:0 0 16px}
  .note a{color:#1d4ed8;font-weight:700}
  .loading{color:var(--gray);font-size:14px;padding:24px 2px}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(20,20,20,.5);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:60;padding:20px}
  .modal{width:100%;max-width:460px;background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);padding:24px;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 4px;font-size:18px}.modal .msub{color:var(--muted);font-size:13px;margin:0 0 12px}
  .roles{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .roles label{display:flex;align-items:center;gap:7px;background:#fafafa;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;color:#333;margin:0;cursor:pointer}
  .roles input{width:auto;margin:0}
  .mfoot{display:flex;gap:10px;margin-top:20px}.mfoot .btn{margin:0}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#141414;color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);z-index:80;opacity:0;transition:.25s}
  .toast.on{opacity:1}.toast.bad{background:#b91c1c}
  @media(max-width:900px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
    .main{margin-left:0;padding:64px 18px 90px}
    .menuBtn{display:block}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <form class="loginbox" id="loginForm" autocomplete="on">
    <div class="brand"><div class="logo">M</div><div><b>Central Comercial</b><small>MasterInfo Internet</small></div></div>
    <h1>Entrar</h1>
    <p class="lsub">Acesse com seu e-mail e senha.</p>
    <label>E-mail</label>
    <input id="u" type="email" placeholder="voce@masterinfo.com" autocomplete="username">
    <label>Senha</label>
    <input id="p" type="password" placeholder="sua senha" autocomplete="current-password">
    <div id="loginErr" class="err hide"></div>
    <button class="btn" type="submit" id="loginBtn">Entrar</button>
    <div class="hint">Use o e-mail e a senha cadastrados pra você. Sem acesso? Fale com o Gestor.</div>
  </form>
</div>

<!-- APP -->
<div id="app" class="hide">
  <button class="menuBtn" id="menuBtn">☰</button>
  <div class="scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sbrand"><div class="logo">M</div><div><b>Central Comercial</b><small>MasterInfo</small></div></div>
    <nav class="snav" id="nav"></nav>
    <div class="sme">
      <div class="card">
        <div class="avatar" id="meAv"></div>
        <div class="info"><b id="meName"></b><span class="role" id="meRole"></span></div>
      </div>
      <button class="logout" id="logout">Sair</button>
    </div>
  </aside>
  <main class="main"><div id="view"></div></main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  var SUPABASE_URL = "https://rpqxcskakuphpyglnrib.supabase.co";
  var SUPABASE_KEY = "sb_publishable_xhh-g0rT6DsvBphFiv7fnQ_i9PICYpC";
  var DASH_USERS = "https://supabase.com/dashboard/project/rpqxcskakuphpyglnrib/auth/users";
  var ROLES = { colaborador:"Colaborador", lider:"Líder", gestor:"Gestor" };
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var $ = function(s,el){ return (el||document).querySelector(s); };
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m];}); }
  function toast(m,bad){ var t=$("#toast"); t.textContent=m; t.className="toast on"+(bad?" bad":""); clearTimeout(t._t); t._t=setTimeout(function(){t.className="toast";},2200); }
  function initials(s){ s=(s||"").trim(); if(!s) return "?"; var p=s.split(/\s+/); return (p[0][0]+(p[1]?p[1][0]:"")).toUpperCase(); }
  function firstName(s){ return (s||"").split(/\s+/)[0]; }

  var me=null, myContent=[], state={view:"home"}, dbError="";

  /* ---- LOGIN ---- */
  $("#loginForm").addEventListener("submit", async function(e){
    e.preventDefault();
    var email=$("#u").value.trim(), senha=$("#p").value, err=$("#loginErr"), btn=$("#loginBtn");
    err.classList.add("hide"); btn.disabled=true; btn.textContent="Entrando...";
    var res=await sb.auth.signInWithPassword({email:email,password:senha});
    btn.disabled=false; btn.textContent="Entrar";
    if(res.error){
      var m=res.error.message||"";
      if(/invalid login/i.test(m)) m="E-mail ou senha incorretos.";
      else if(/confirm/i.test(m)) m="E-mail ainda não confirmado. Peça ao Gestor pra confirmar seu usuário.";
      err.textContent=m; err.classList.remove("hide"); return;
    }
    boot();
  });
  $("#logout").addEventListener("click", async function(){
    await sb.auth.signOut(); me=null; myContent=[]; state.view="home";
    $("#app").classList.add("hide"); $("#login").classList.remove("hide"); $("#u").value=""; $("#p").value="";
  });
  $("#menuBtn").addEventListener("click", function(){ toggleSide(true); });
  $("#scrim").addEventListener("click", function(){ toggleSide(false); });
  function toggleSide(on){ $("#sidebar").classList.toggle("open",on); $("#scrim").classList.toggle("on",on); }

  /* ---- BOOT ---- */
  async function boot(){
    var sess=(await sb.auth.getSession()).data.session;
    if(!sess){ $("#app").classList.add("hide"); $("#login").classList.remove("hide"); return; }
    var uid=sess.user.id;
    var prof=await sb.from("profiles").select("*").eq("id",uid).single();
    me=prof.data||{id:uid,nome:sess.user.email,email:sess.user.email,tipo:"colaborador"};
    $("#login").classList.add("hide"); $("#app").classList.remove("hide");
    $("#meName").textContent=me.nome||me.email;
    $("#meAv").textContent=initials(me.nome||me.email);
    var r=$("#meRole"); r.textContent=ROLES[me.tipo]||me.tipo; r.className="role "+me.tipo;
    await loadContent();
    state.view="home"; buildNav(); renderMain();
  }

  async function loadContent(){
    dbError="";
    try{
      var q=await sb.from("content").select("*").order("ordem");
      if(q.error){ myContent=[]; dbError=/schema cache|does not exist|not find the table/i.test(q.error.message||"")?"setup":(q.error.message||"erro"); return; }
      myContent=(q.data||[]).filter(function(it){ return (it.roles||[]).indexOf(me.tipo)>=0; });
    }catch(e){ myContent=[]; dbError=String((e&&e.message)||e)||"erro"; }
  }
  function cats(){ var c=[]; myContent.forEach(function(it){ if(c.indexOf(it.categoria)<0) c.push(it.categoria); }); return c; }

  /* ---- SIDEBAR ---- */
  function buildNav(){
    var nav=$("#nav"); nav.innerHTML="";
    add("home","🏠","Início");
    var cs=cats();
    if(cs.length){ var s=document.createElement("div"); s.className="sec"; s.textContent="Materiais"; nav.appendChild(s); }
    cs.forEach(function(c){ add("cat:"+c, iconFor(c), c); });
    if(me.tipo==="gestor"){ var s2=document.createElement("div"); s2.className="sec"; s2.textContent="Gestão"; nav.appendChild(s2); add("admin","⚙️","Administração"); }
    function add(view,ic,label){
      var b=document.createElement("button"); b.innerHTML='<span class="ic">'+ic+'</span> '+esc(label);
      if(state.view===view) b.className="active";
      b.onclick=function(){ state.view=view; buildNav(); renderMain(); toggleSide(false); };
      nav.appendChild(b);
    }
  }
  function iconFor(c){ var m={"Onboarding":"🚀","Processos":"🗂️","Lideranca":"🧭","Liderança":"🧭","Geral":"📄"}; return m[c]||"📁"; }

  /* ---- RENDER ---- */
  function renderMain(){
    if(state.view==="admin" && me.tipo==="gestor"){ renderAdmin(); return; }
    if(state.view.indexOf("cat:")===0){ renderCat(state.view.slice(4)); return; }
    renderHome();
  }
  function tileHtml(it){
    var real=it.url&&it.url!=="#";
    if(real) return '<a class="tile" href="'+esc(it.url)+'" target="_blank" rel="noopener"><div class="em">'+esc(it.emoji||"📄")+'</div><h4>'+esc(it.titulo)+'</h4><p>'+esc(it.descricao||"")+'</p></a>';
    return '<div class="tile soon"><div class="em">'+esc(it.emoji||"📄")+'</div><h4>'+esc(it.titulo)+'</h4><p>'+esc(it.descricao||"")+'</p><span class="soonlb">link a definir</span></div>';
  }
  function renderHome(){
    var sub={colaborador:"Aqui está o seu material de estudo e do dia a dia.",lider:"Acompanhe o time e conduza o onboarding.",gestor:"Você tem acesso a tudo e à administração do sistema."}[me.tipo]||"";
    var html='<div class="hero"><h1>Olá, <span class="wave">'+esc(firstName(me.nome||me.email))+'</span> 👋</h1><p>'+esc(sub)+'</p></div>';
    html+='<div class="stats"><div class="stat"><div class="n">'+myContent.length+'</div><div class="l">materiais disponíveis</div></div>'+
          '<div class="stat"><div class="n">'+cats().length+'</div><div class="l">áreas</div></div>'+
          '<div class="stat"><div class="n">'+esc(ROLES[me.tipo])+'</div><div class="l">seu perfil</div></div></div>';
    if(dbError==="setup"){ html+='<div class="empty" style="margin-top:20px;border-color:#fecaca;background:#fff5f5;color:#991b1b">⚠️ O banco de dados ainda não foi montado no Supabase. Rode o SQL de setup (tabelas <b>profiles</b> e <b>content</b>) e recarregue.</div>'; }
    else if(dbError){ html+='<div class="empty" style="margin-top:20px;border-color:#fecaca;background:#fff5f5;color:#991b1b">Erro ao carregar o conteúdo: '+esc(dbError)+'</div>'; }
    else if(!myContent.length){ html+='<div class="empty" style="margin-top:20px">Nenhum material liberado para o seu perfil ainda.</div>'; }
    cats().forEach(function(c){
      html+='<div class="cat">'+esc(c)+'</div><div class="grid">';
      myContent.filter(function(it){return it.categoria===c;}).forEach(function(it){ html+=tileHtml(it); });
      html+='</div>';
    });
    $("#view").innerHTML=html;
  }
  function renderCat(c){
    var items=myContent.filter(function(it){return it.categoria===c;});
    var html='<h2 class="page">'+esc(c)+'</h2><p class="psub">'+items.length+' '+(items.length===1?"material":"materiais")+' nesta área.</p>';
    if(!items.length) html+='<div class="empty">Nada aqui ainda.</div>';
    else { html+='<div class="grid">'; items.forEach(function(it){ html+=tileHtml(it); }); html+='</div>'; }
    $("#view").innerHTML=html;
  }

  /* ---- ADMIN ---- */
  async function renderAdmin(){
    var v=$("#view");
    v.innerHTML='<h2 class="page">Administração</h2><p class="psub">Gerencie usuários e o conteúdo que cada perfil vê.</p>'+
      '<div class="tabs"><button data-at="users" class="active">👥 Usuários</button><button data-at="content">🗂️ Conteúdo</button></div><div id="ab"><div class="loading">Carregando…</div></div>';
    var at="users";
    function tw(){ Array.prototype.forEach.call(v.querySelectorAll(".tabs button"),function(b){ b.classList.toggle("active",b.getAttribute("data-at")===at); b.onclick=function(){ at=b.getAttribute("data-at"); paint(); }; }); }
    async function paint(){ tw(); if(at==="users") await usersPanel(); else await contentPanel(); }
    tw(); paint();

    async function usersPanel(){
      var q=await sb.from("profiles").select("*").order("created_at");
      var rows=(q.data||[]).map(function(u){
        return '<tr><td><b>'+esc(u.nome||"-")+'</b></td><td>'+esc(u.email||"")+'</td><td><span class="rb '+u.tipo+'">'+(ROLES[u.tipo]||u.tipo)+'</span></td><td class="acts"><button class="iconbtn" data-eu="'+u.id+'">Editar</button></td></tr>';
      }).join("");
      $("#ab",v).innerHTML='<div class="panel"><div class="ph"><b>Usuários</b><button class="btn sm" id="newUser">+ Novo usuário</button></div><table><thead><tr><th>Nome</th><th>E-mail</th><th>Tipo</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div><div class="note">Prefere criar/remover pelo Supabase? <a href="'+DASH_USERS+'" target="_blank" rel="noopener">abrir Usuários no painel</a>.</div>';
      $("#newUser",v).onclick=function(){ createUserModal(); };
      Array.prototype.forEach.call(v.querySelectorAll("[data-eu]"),function(b){ b.onclick=function(){ userModal((q.data||[]).filter(function(x){return x.id===b.getAttribute("data-eu");})[0]); }; });
    }
    function createUserModal(){
      openModal("Novo usuário","Cria o login (e-mail e senha) e já define o perfil.",
        '<label>Nome</label><input id="mNome" placeholder="Nome da pessoa">'+
        '<label>E-mail (login)</label><input id="mEmail" type="email" placeholder="pessoa@masterinfo.com">'+
        '<label>Senha inicial (mín. 6)</label><input id="mSenha" placeholder="a pessoa troca depois">'+
        '<label>Tipo de perfil</label><select id="mTipo">'+Object.keys(ROLES).map(function(k){return '<option value="'+k+'">'+ROLES[k]+'</option>';}).join("")+'</select>',
        async function(){
          var nome=$("#mNome").value.trim(),email=$("#mEmail").value.trim(),senha=$("#mSenha").value,tipo=$("#mTipo").value;
          if(!email||!senha){ toast("Informe e-mail e senha.",true); return false; }
          var r=await sb.functions.invoke("create-user",{body:{nome:nome,email:email,password:senha,tipo:tipo}});
          if(r.error){ var msg="Erro ao criar usuário."; try{var bd=await r.error.context.json();if(bd&&bd.error)msg=bd.error;}catch(_){}
            if(/Failed to (fetch|send)|NetworkError|not found|404/i.test((r.error.message||"")+" "+msg)) msg="A função 'create-user' ainda não foi publicada no Supabase.";
            toast(msg,true); return false; }
          if(r.data&&r.data.error){ toast(r.data.error,true); return false; }
          toast("Usuário criado."); paint(); return true;
        });
    }
    function userModal(u){
      openModal("Editar usuário","Defina o nome e o tipo de perfil (o login fica no Supabase).",
        '<label>Nome</label><input id="mNome" value="'+esc(u.nome||"")+'">'+
        '<label>E-mail</label><input value="'+esc(u.email||"")+'" disabled style="opacity:.6">'+
        '<label>Tipo de perfil</label><select id="mTipo">'+Object.keys(ROLES).map(function(k){return '<option value="'+k+'"'+(u.tipo===k?" selected":"")+'>'+ROLES[k]+'</option>';}).join("")+'</select>',
        async function(){
          if(u.id===me.id&&$("#mTipo").value!=="gestor"){ toast("Você não pode tirar seu próprio acesso de Gestor.",true); return false; }
          var r=await sb.from("profiles").update({nome:$("#mNome").value.trim(),tipo:$("#mTipo").value}).eq("id",u.id);
          if(r.error){ toast(r.error.message,true); return false; }
          toast("Usuário salvo."); if(u.id===me.id){ me.tipo=$("#mTipo").value; } paint(); return true;
        });
    }

    async function contentPanel(){
      var q=await sb.from("content").select("*").order("ordem");
      var rows=(q.data||[]).map(function(it){
        var badges=(it.roles||[]).map(function(r){return '<span class="rb '+r+'" style="margin-right:4px">'+(ROLES[r]||r)+'</span>';}).join("");
        return '<tr><td>'+esc(it.emoji||"📄")+' <b>'+esc(it.titulo)+'</b><br><small style="color:#9aa0a6">'+esc(it.categoria)+'</small></td><td>'+badges+'</td><td class="acts"><button class="iconbtn" data-ei="'+it.id+'">Editar</button><button class="iconbtn del" data-di="'+it.id+'">Excluir</button></td></tr>';
      }).join("");
      $("#ab",v).innerHTML='<div class="panel"><div class="ph"><b>Conteúdo</b><button class="btn sm" id="newItem">+ Novo conteúdo</button></div><table><thead><tr><th>Título</th><th>Quem vê</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
      $("#newItem",v).onclick=function(){ itemModal(null); };
      Array.prototype.forEach.call(v.querySelectorAll("[data-ei]"),function(b){ b.onclick=function(){ itemModal((q.data||[]).filter(function(x){return x.id===b.getAttribute("data-ei");})[0]); }; });
      Array.prototype.forEach.call(v.querySelectorAll("[data-di]"),function(b){ b.onclick=async function(){ if(!confirm("Excluir este conteúdo?"))return; var r=await sb.from("content").delete().eq("id",b.getAttribute("data-di")); if(r.error){toast(r.error.message,true);return;} toast("Excluído."); await loadContent(); buildNav(); paint(); }; });
    }
    function itemModal(it){
      var isNew=!it; it=it||{emoji:"📄",titulo:"",descricao:"",url:"",categoria:"Geral",roles:["colaborador","lider","gestor"],ordem:99};
      openModal((isNew?"Novo":"Editar")+" conteúdo","Um card que aparece pra quem tiver o perfil marcado.",
        '<label>Emoji</label><input id="mEmoji" value="'+esc(it.emoji)+'" maxlength="4">'+
        '<label>Título</label><input id="mTit" value="'+esc(it.titulo)+'">'+
        '<label>Descrição</label><input id="mDesc" value="'+esc(it.descricao)+'">'+
        '<label>Link (URL) — deixe # se ainda não tiver</label><input id="mUrl" value="'+esc(it.url)+'">'+
        '<label>Categoria</label><input id="mCat" value="'+esc(it.categoria)+'">'+
        '<label>Quem vê</label><div class="roles">'+Object.keys(ROLES).map(function(k){return '<label><input type="checkbox" value="'+k+'"'+((it.roles||[]).indexOf(k)>=0?" checked":"")+'> '+ROLES[k]+'</label>';}).join("")+'</div>',
        async function(){
          var titulo=$("#mTit").value.trim(); if(!titulo){ toast("Dê um título.",true); return false; }
          var roles=Array.prototype.map.call(document.querySelectorAll(".roles input:checked"),function(c){return c.value;});
          if(!roles.length){ toast("Marque ao menos um perfil.",true); return false; }
          var data={emoji:$("#mEmoji").value||"📄",titulo:titulo,descricao:$("#mDesc").value.trim(),url:$("#mUrl").value.trim()||"#",categoria:$("#mCat").value.trim()||"Geral",roles:roles};
          var r=isNew?await sb.from("content").insert(data):await sb.from("content").update(data).eq("id",it.id);
          if(r.error){ toast(r.error.message,true); return false; }
          toast("Conteúdo salvo."); await loadContent(); buildNav(); paint(); return true;
        });
    }
  }

  /* ---- MODAL ---- */
  function openModal(title,sub,bodyHtml,onSave){
    var ov=document.createElement("div"); ov.className="ov";
    ov.innerHTML='<div class="modal"><h3>'+esc(title)+'</h3><p class="msub">'+esc(sub)+'</p><div>'+bodyHtml+'</div><div class="mfoot"><button class="btn sec" id="mCancel">Cancelar</button><button class="btn" id="mSave">Salvar</button></div></div>';
    document.body.appendChild(ov);
    function close(){ if(ov.parentNode) document.body.removeChild(ov); }
    ov.addEventListener("click",function(e){ if(e.target===ov) close(); });
    $("#mCancel",ov).onclick=close;
    $("#mSave",ov).onclick=async function(){ var b=$("#mSave",ov); b.disabled=true; var ok=await onSave(); b.disabled=false; if(ok!==false) close(); };
  }

  boot();
})();
</script>
</body>
</html>
